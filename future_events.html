<!DOCTYPE html>
<html lang="sv">

<head>

    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="stylesheet" href="./src/css/header.css">
    <link rel="stylesheet" href="./src/css/footer.css">

                <a id="picturesBtn">Bilder</a>

    <main>
        <h1>
            Kommande Spelningar

            <a href="https://www.google.com/maps/place/Stenungsund/@58.0711951,11.7658824,13z/data=!3m1!4b1!4m15!1m8!3m7!1s0x464571deef5b6193:0xb0190781053bcb3!2s444+48+Stenungsund!3b1!8m2!3d58.0677406!4d11.7992447!16s%2Fg%2F1w2ysgmn!3m5!1s0x46456e24aedb6a29:0xf4f1b46056b612ce!8m2!3d58.0678388!4d11.8294345!16s%2Fm%2F02p3h10?entry=ttu&g_ep=EgoyMDI2MDUwNi4wIKXMDSoASAFQAw%3D%3D" target="_blank" rel="noopener noreferrer" class="contact_links">Stenungsund, Sverige</a>
