<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="utf-8">
    <link rel="icon" type="image/svg+xml" href="./images/logos/valar_pa_land-text.svg"/>
    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="stylesheet" href="./src/css/indexheader.css">
    <link rel="stylesheet" href="./src/css/indexfooter.css">
    <link rel="stylesheet" href="./src/css/index.css">
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <link rel="manifest" href="./src/manifest.json"/>
    <title>Valar På Land - Hem</title>
</head>

<body>
    <header>
        <button id="homeBtn"><img src="./images/logos/valar_pa_land-logo-nobg.png" alt="Logga för Valar på Land" class="vpl_logo"></button>
        <div class="dropdown">
            <button class="dropBtn" id="events_Btn">Spelningar </button>
            <div class="dropdown_content">
                <a id="future_eventsBtn">Kommande spelningar</a>
                <a id="past_eventsBtn">Tidigare spelningar</a>
            </div>
        </div>
        <div class="dropdown">
            <button class="dropBtn" id="about_usBtn">Om Oss </button>
            <div class="dropdown_content">
                <a id="membersBtn">Bandet</a>
                <a id="picturesBtn">Bilder</a>
            </div>
        </div>
    </header>

    <main>
        <h1 class="title">
            <span translate="yes">Välkommen till</span>
            <span translate="no">Valar På Land!</span>
        </h1>
        <h2 class="basic_info">
            Här kommer all info relaterat till oss. Allt från spelningar till albumsläpp.
        </h2>
        <h1>NÄSTA SPELNING:</h1>
        <a href="https://valarpaland.se/future_events" class="main_event">
            Spelningar kommer snart!
        </a>
    </main>

    <footer>
        <div class="social_icons">
            <a href="https://www.instagram.com/valar_pa_land/" target="_blank" rel="noopener noreferrer" class="instagram">Instagram</a>
            <a href="https://www.tiktok.com/@valar_pa_land" target="_blank" rel="noopener noreferrer" class="tiktok">TikTok</a>
            <a href="https://www.youtube.com/@valar_pa_land" target="_blank" rel="noopener noreferrer" class="youtube">YouTube</a>
            <a href="https://www.facebook.com/profile.php?id=61574634716303" target="_blank" rel="noopener noreferrer" class="facebook">Facebook</a>
        </div>
        <script src="./src/javascript/script.js"></script>
        <script src="./src/javascript/sw-registration.js"></script>
    </footer>
</body>

</html>
