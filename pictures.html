<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="utf-8">
    <link rel="icon" type="image/svg+xml" href="./images/logos/valar_pa_land-text.svg" />
    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="stylesheet" href="./src/css/header.css">
    <link rel="stylesheet" href="./src/css/footer.css">
    <link rel="stylesheet" href="./src/css/pictures.css">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="manifest" href="./src/manifest.json" />
    <title>Valar På Land - Bilder</title>
</head>

<body>
    <header>
        <img src="./images/logos/valar_pa_land-text.svg" alt="Logga för Valar på Land" class="vpl-logo">
        <button id="homeBtn">Hem</button>
        <div class="dropdown">
            <button class="dropbtn" id="about_usBtn">Om Oss </button>
            <div class="dropdown-content">
                <a id="bandBtn">Bandet</a>
                <a id="picturesBtn">Bilder</a>
            </div>
        </div>
        <div class="dropdown">
            <button class="dropbtn" id="eventsBtn">Evenemang </button>
            <div class="dropdown-content">
                <a id="futureBtn">Kommande evenemang</a>
                <a id="pastBtn">Tidigare evenemang</a>
            </div>
        </div>
        <button id="contact_usBtn">Kontakta Oss</button>
    </header>

    <main>
        <div class="band">
            <h1>
                Valar På Land
            </h1>
            <div class="carousel" id="band-carousel">
                <button class="btn prev" type="button" data-carousel="band-carousel">&#10094;</button>
                <div class="carousel-track">
                    <img src="./images/pics/Inne1.jpg" alt="Bild på Valar på Land innomhus" class="slide" loading="lazy">
                    <img src="./images/pics/Inne2.jpg" alt="Bild på Valar på Land innomhus" class="slide" loading="lazy">
                    <img src="./images/pics/Inne3.jpg" alt="Bild på Valar på Land innomhus" class="slide" loading="lazy">
                    <img src="./images/pics/Inne4.jpg" alt="Bild på Valar på Land innomhus" class="slide" loading="lazy">
                    <img src="./images/pics/Ute1.jpg" alt="Bild på Valar på Land utomhus" class="slide" loading="lazy">
                </div>
                <button class="btn next" type="button" data-carousel="band-carousel">&#10095;</button>
            </div>
        </div>
    </main>

    <footer>
        <div class="social-icons">
            <a href="https://www.instagram.com/valar_pa_land/" target="_blank" rel="noopener noreferrer" class="instagram">Instagram</a>
            <a href="https://www.facebook.com/people/Valar-På-Land/61574634716303/" target="_blank" rel="noopener noreferrer" class="facebook">Facebook</a>
            <a href="https://www.youtube.com/@valar_pa_land" target="_blank" rel="noopener noreferrer" class="youtube">YouTube</a>
            <a href="https://www.tiktok.com/@valar_pa_land" target="_blank" rel="noopener noreferrer" class="tiktok">TikTok</a>
            <a href="https://github.com/Samiboi1/valar_pa_land" target="_blank" rel="noopener noreferrer" class="github">GitHub</a>
        </div>
        <p class="credit">
            Utvecklad av trummisen i bandet
        </p>
        <script src="./src/javascript/script.js"></script>
        <script src="./src/javascript/pictures.js"></script>
        <script src="./src/javascript/sw-registration.js"></script>
    </footer>
</body>

</html>
